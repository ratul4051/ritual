  /* Very minimal overlay — just enough for text readability, 
     keeps the texture, smoke and fire fully visible */
  .bg-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      /* Only the very edges go dark — center stays open */
      linear-gradient(to right,  rgba(2,1,0,0.70) 0%, rgba(2,1,0,0.20) 12%, transparent 30%),
      linear-gradient(to left,   rgba(2,1,0,0.55) 0%, rgba(2,1,0,0.10) 12%, transparent 30%),
      /* Bottom third darkens for the form area */
      linear-gradient(to top,    rgba(2,1,0,0.88) 0%, rgba(2,1,0,0.60) 18%, rgba(2,1,0,0.20) 42%, transparent 60%),
      /* Very slight top darkening */
      linear-gradient(to bottom, rgba(2,1,0,0.45) 0%, rgba(2,1,0,0.05) 12%, transparent 25%);
  }

  /* ── ALL CONTENT ── */
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ══ LOGO ══ */
  .logo-wrap {
    width: 270px;
    height: 270px;
    margin-bottom: 6px;
    filter:
      drop-shadow(0 28px 52px rgba(0,0,0,0.90))
      drop-shadow(0 12px 24px rgba(0,0,0,0.70))
      drop-shadow(0  4px 10px rgba(0,0,0,0.55))
      drop-shadow(0  0  22px rgba(180,140,40,0.18));
    animation: float 6s ease-in-out infinite;
  }
  .logo-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }

  /* ══ BRAND NAME — reduced size, metallic #D4AF37 ══ */
  .brand {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.10rem, 9vw, 2.75rem);
    font-weight: 600;
    letter-spacing: 0.30em;
    text-indent: 0.30em;
    background: linear-gradient(180deg,
      #f5e090 0%,
      #D4AF37 20%,
      #C5A059 48%,
      #a87828 72%,
      #7a5510 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter:
      drop-shadow(0 2px 14px rgba(0,0,0,0.85))
      drop-shadow(0 0  10px rgba(212,175,55,0.30))
      drop-shadow(0 1px 3px  rgba(0,0,0,0.95));
    margin-bottom: 42px;
  }

  /* ══ HEADLINE — #BFA37E champagne gold + bloom ══ */
  .headline {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.20rem, 10.8vw, 3.20rem);
    font-weight: 400;
    line-height: 1.12;
    text-align: center;
    letter-spacing: 0.06em;
    background: linear-gradient(175deg,
      #e8d090 0%,
      #C8A84A 22%,
      #BFA37E 50%,
      #a08040 75%,
      #7a5e20 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter:
      drop-shadow(0 0  14px rgba(191,163,126,0.50))
      drop-shadow(0 0  28px rgba(191,163,126,0.22))
      drop-shadow(0 2px 8px  rgba(0,0,0,0.90));
    margin-bottom: 26px;
  }

  /* ══ DIVIDER ══ */
  .divider {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 280px;
    margin-bottom: 24px;
  }
  .div-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #BFA37E 50%, transparent 100%);
    opacity: 0.55;
  }
  .div-diamond {
    width: 8px; height: 8px;
    border: 1.2px solid #BFA37E;
    transform: rotate(45deg);
    margin: 0 14px;
    flex-shrink: 0;
    opacity: 0.75;
  }

  /* ══ BODY TEXT — #E0D7C6 off-white, flat ══ */
  .subtext {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(0.97rem, 3.3vw, 1.12rem);
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.06em;
    line-height: 1.90;
    color: #E0D7C6;
    text-align: center;
    margin-bottom: 48px;
  }

  /* ══ JOIN THE INNER CIRCLE ══ */
  .inner-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.63rem, 2.3vw, 0.76rem);
    font-weight: 500;
    letter-spacing: 0.46em;
    text-indent: 0.46em;
    color: #D4AF37;
    margin-bottom: 12px;
  }
  .inner-line {
    width: 100%;
    max-width: 290px;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #BFA37E 50%, transparent 100%);
    opacity: 0.50;
    margin-bottom: 18px;
  }
  .inner-desc {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(0.94rem, 3.1vw, 1.08rem);
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.05em;
    line-height: 1.92;
    color: #E0D7C6;
    text-align: center;
    margin-bottom: 30px;
  }

  /* ══ EMAIL FORM ══ */
  .email-row {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 430px;
    height: 58px;
    border: 1px solid rgba(191,163,126,0.38);
    border-radius: 36px;
    overflow: hidden;
    background: rgba(5,4,2,0.52);
    margin-bottom: 30px;
    box-shadow:
      inset 0 0 0 0.5px rgba(191,163,126,0.12),
      0 4px 28px rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
  }
  .email-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #E0D7C6;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 1.05rem;
    letter-spacing: 0.06em;
    padding: 0 26px;
  }
  .email-row input::placeholder { color: rgba(224,215,198,0.38); }

  .notify-btn {
    margin: 5px 6px 5px 0;
    height: calc(100% - 10px);
    padding: 0 28px;
    border-radius: 32px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg,
      #8a6215 0%,
      #b08828 35%,
      #D4AF37 65%,
      #e8cc60 100%
    );
    font-family: 'Cinzel', serif;
    font-size: 0.63rem;
    font-weight: 700;
    letter-spacing: 0.26em;
    color: #332B1A;
    white-space: nowrap;
    box-shadow:
      0 3px 18px rgba(0,0,0,0.60),
      inset 0 1px 2px rgba(255,230,120,0.25);
    transition: all 0.22s ease;
  }
  .notify-btn:hover {
    opacity: 0.88;
    box-shadow: 0 6px 28px rgba(0,0,0,0.75);
  }

  /* ══ SOCIAL ICONS — solid #C5A059 ══ */
  .socials {
    display: flex;
    gap: 40px;
    align-items: center;
    margin-bottom: 34px;
  }
  .socials a {
    color: #C5A059;
    display: flex;
    align-items: center;
    text-decoration: none;
    transition: color 0.22s, transform 0.22s;
  }
  .socials a:hover { color: #D4AF37; transform: translateY(-2px); }
  .socials svg { width: 25px; height: 25px; }

  /* ══ COPYRIGHT ══ */
  .copyright {
    font-family: 'Cinzel', serif;
    font-size: 0.54rem;
    letter-spacing: 0.32em;
    text-indent: 0.32em;
    color: rgba(191,163,126,0.40);
    text-align: center;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="page">

  <!-- Background image — full bleed, same-to-same -->
  <div class="bg-img"></div>
  <!-- Minimal vignette — preserves smoke/fire/texture -->
  <div class="bg-overlay"></div>
